<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randwick Championships Day 2 — Tipping Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green:   #1a3d2b;
    --gold:    #c9a84c;
    --gold-lt: #e8c96e;
    --cream:   #f5f0e8;
    --sand:    #e8dfc8;
    --red:     #8b2020;
    --ink:     #1a1610;
    --muted:   #7a7060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--green);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.06) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid rgba(201,168,76,0.3);
    position: relative;
  }
  header::before {
    content: '🏇';
    font-size: 2.8rem;
    display: block;
    margin-bottom: 0.5rem;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.5));
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }
  header h1 span { color: var(--cream); }
  header p {
    margin-top: 0.4rem;
    font-size: 0.85rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── POT / META BAR ── */
  .meta-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem 2rem;
    padding: 1rem 2rem;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .meta-item strong { color: var(--gold-lt); }
  .meta-item input[type="number"] {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-lt);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    width: 60px;
    padding: 2px 6px;
    border-radius: 4px;
    text-align: center;
    outline: none;
  }
  .meta-item input:focus { border-color: var(--gold); }

  /* ── MAIN SCROLL AREA ── */
  .scroll-wrap {
    overflow-x: auto;
    padding: 1.5rem 1rem 2rem;
  }

  /* ── TABLE ── */
  table {
    border-collapse: collapse;
    min-width: 900px;
    width: 100%;
  }

  /* Race header row */
  thead tr.race-header th {
    font-family: 'Playfair Display', serif;
    font-size: 0.78rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.5rem 0.4rem 0.2rem;
    text-align: center;
    border-bottom: 2px solid rgba(201,168,76,0.4);
    white-space: nowrap;
    vertical-align: bottom;
  }
  thead tr.race-header th.player-col {
    text-align: left;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.72rem;
    min-width: 110px;
    padding-left: 0.8rem;
  }
  thead tr.race-header th .race-num {
    display: block;
    font-size: 1rem;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 2px;
  }
  thead tr.race-header th .race-name {
    display: block;
    font-size: 0.6rem;
    opacity: 0.75;
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin: 0 auto;
  }
  thead tr.race-header th.total-col {
    color: var(--gold-lt);
    font-weight: 900;
    font-size: 0.75rem;
    min-width: 70px;
  }

  /* Player rows */
  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.15s;
  }
  tbody tr:hover { background: rgba(255,255,255,0.03); }

  tbody td {
    padding: 0.35rem 0.3rem;
    text-align: center;
    vertical-align: middle;
  }
  tbody td.player-name {
    text-align: left;
    padding-left: 0.8rem;
    font-weight: 500;
    font-size: 0.85rem;
    white-space: nowrap;
    color: var(--cream);
  }
  tbody td.player-name input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed rgba(201,168,76,0.3);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    width: 100px;
    outline: none;
    padding: 2px 0;
  }
  tbody td.player-name input:focus { border-bottom-color: var(--gold); }

  /* Pick cells */
  .pick-cell {
    position: relative;
  }
  .pick-cell input.horse-pick {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 5px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    width: 78px;
    padding: 4px 5px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .pick-cell input.horse-pick:focus {
    border-color: rgba(201,168,76,0.6);
    background: rgba(201,168,76,0.07);
  }
  .pick-cell input.horse-pick.won {
    background: rgba(34,120,60,0.25);
    border-color: rgba(60,200,100,0.5);
    color: #7fffaa;
    font-weight: 600;
  }

  /* SP odds input */
  .pick-cell input.sp-odds {
    background: transparent;
    border: none;
    border-bottom: 1px dashed rgba(201,168,76,0.4);
    color: var(--gold-lt);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    width: 44px;
    text-align: center;
    outline: none;
    margin-top: 2px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  .pick-cell input.sp-odds:focus { border-bottom-color: var(--gold); }
  .pick-cell input.sp-odds::placeholder { color: rgba(201,168,76,0.3); font-style: italic; }

  /* Total cell */
  td.total-cell {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--gold-lt);
    min-width: 70px;
    letter-spacing: 0.03em;
  }
  td.total-cell.leader {
    color: #7fffaa;
    text-shadow: 0 0 12px rgba(127,255,170,0.4);
  }

  /* ── LEADERBOARD FOOTER ── */
  .leaderboard {
    max-width: 480px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
  }
  .leaderboard h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    text-align: center;
    margin-bottom: 0.8rem;
    letter-spacing: 0.04em;
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.8rem;
    border-radius: 8px;
    margin-bottom: 0.3rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    transition: background 0.2s;
  }
  .lb-row.rank-1 {
    background: rgba(201,168,76,0.12);
    border-color: rgba(201,168,76,0.3);
  }
  .lb-rank {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    width: 18px;
    text-align: right;
    flex-shrink: 0;
  }
  .lb-row.rank-1 .lb-rank { color: var(--gold); font-weight: 600; }
  .lb-trophy { font-size: 1rem; flex-shrink: 0; }
  .lb-name { flex: 1; font-size: 0.88rem; font-weight: 500; }
  .lb-score {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--gold-lt);
    font-weight: 600;
  }
  .lb-payout {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.6rem;
    padding: 0 1rem 1.5rem;
  }
  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.45rem 1.1rem;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-weight: 500;
  }
  button:hover { opacity: 0.88; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .btn-primary { background: var(--gold); color: var(--ink); }
  .btn-ghost { background: transparent; border: 1px solid rgba(201,168,76,0.4); color: var(--gold-lt); }
  .btn-danger { background: rgba(139,32,32,0.7); border: 1px solid rgba(200,60,60,0.4); color: #ffaaaa; }

  /* ── RACE HEADER EDIT ── */
  thead tr.race-names th.name-edit input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed rgba(201,168,76,0.3);
    color: var(--gold-lt);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    width: 78px;
    text-align: center;
    outline: none;
    letter-spacing: 0.03em;
  }
  thead tr.race-names th.name-edit input:focus { border-bottom-color: var(--gold); }
  thead tr.race-names th { padding: 0.2rem 0.4rem 0.5rem; }

  /* ── POT STATS ── */
  .pot-banner {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.5rem;
    padding: 1rem 2rem;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(201,168,76,0.15);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    margin-bottom: 1rem;
  }
  .stat-block { text-align: center; }
  .stat-block .val {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
    font-weight: 700;
    line-height: 1;
  }
  .stat-block .lbl {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-top: 2px;
  }

  /* scroll bar */
  ::-webkit-scrollbar { height: 6px; }
  ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
  ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Royal Randwick <span>Championships</span></h1>
  <p>Day 2 · Saturday 11 April 2026 · Tipping Competition</p>
</header>

<div class="meta-bar">
  <span class="meta-item">Buy-in: $<input type="number" id="buyin" value="25" min="1" max="500"> per person</span>
  <span class="meta-item" id="pot-display">Total Pot: <strong id="pot-val">$0</strong></span>
  <span class="meta-item">10 Races · First Race 11:45am</span>
</div>

<div class="pot-banner">
  <div class="stat-block"><div class="val" id="stat-pot">$0</div><div class="lbl">Total Pot</div></div>
  <div class="stat-block"><div class="val" id="stat-players">0</div><div class="lbl">Players</div></div>
  <div class="stat-block"><div class="val" id="stat-leader">—</div><div class="lbl">Leader</div></div>
  <div class="stat-block"><div class="val" id="stat-races">0</div><div class="lbl">Races Done</div></div>
</div>

<div class="scroll-wrap">
<table id="grid">
  <thead>
    <tr class="race-header" id="race-header-row">
      <th class="player-col">Player</th>
      <!-- Race cols generated by JS -->
      <th class="total-col">Total SP</th>
    </tr>
    <tr class="race-names" id="race-names-row">
      <th></th>
      <!-- Name edit inputs generated by JS -->
      <th></th>
    </tr>
  </thead>
  <tbody id="grid-body">
  </tbody>
</table>
</div>

<div class="controls">
  <button class="btn-primary" onclick="addPlayer()">+ Add Player</button>
  <button class="btn-ghost" onclick="clearAllSP()">Clear SP Odds</button>
  <button class="btn-ghost" onclick="saveState()">💾 Save</button>
  <button class="btn-ghost" onclick="loadState()">📂 Load</button>
  <button class="btn-danger" onclick="resetAll()">Reset All</button>
</div>

<div class="leaderboard">
  <h2>🏆 Leaderboard</h2>
  <div id="lb-list"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const RACES = [
  { num: 1,  name: "Race 1",        time: "11:45" },
  { num: 2,  name: "Race 2",        time: "12:25" },
  { num: 3,  name: "Percy Sykes",   time: "13:05" },
  { num: 4,  name: "Race 4",        time: "13:45" },
  { num: 5,  name: "ATC Oaks",      time: "14:25" },
  { num: 6,  name: "Race 6",        time: "15:05" },
  { num: 7,  name: "Sydney Cup",    time: "15:45" },
  { num: 8,  name: "Queen of Turf", time: "16:20" },
  { num: 9,  name: "Queen Eliz.",   time: "16:55" },
  { num: 10, name: "Race 10",       time: "17:10" },
];

const DEFAULT_PLAYERS = [
  "Player 1","Player 2","Player 3","Player 4","Player 5","Player 6",
  "Player 7","Player 8","Player 9","Player 10","Player 11","Player 12"
];

// state[playerIdx][raceIdx] = { horse, sp, won }
let state = { players: [], picks: [], raceNames: RACES.map(r => r.name) };

function initState() {
  state.players = DEFAULT_PLAYERS.slice();
  state.picks = state.players.map(() => RACES.map(() => ({ horse: "", sp: "", won: false })));
  state.raceNames = RACES.map(r => r.name);
}

// ── BUILD TABLE ────────────────────────────────────────────────────────────
function buildHeader() {
  const headerRow = document.getElementById("race-header-row");
  const namesRow  = document.getElementById("race-names-row");
  // clear existing race cols
  while (headerRow.children.length > 2) headerRow.removeChild(headerRow.children[1]);
  while (namesRow.children.length > 2)  namesRow.removeChild(namesRow.children[1]);

  const totalTh = headerRow.lastElementChild;
  const totalTh2 = namesRow.lastElementChild;

  RACES.forEach((r, ri) => {
    const th = document.createElement("th");
    th.innerHTML = `<span class="race-num">R${r.num}</span><span style="font-size:0.58rem;font-family:'DM Mono',monospace;color:rgba(201,168,76,0.6);display:block;">${r.time}</span>`;
    headerRow.insertBefore(th, totalTh);

    const th2 = document.createElement("th");
    th2.className = "name-edit";
    const inp = document.createElement("input");
    inp.type = "text";
    inp.value = state.raceNames[ri] || r.name;
    inp.placeholder = r.name;
    inp.addEventListener("input", e => { state.raceNames[ri] = e.target.value; });
    th2.appendChild(inp);
    namesRow.insertBefore(th2, totalTh2);
  });
}

function buildBody() {
  const tbody = document.getElementById("grid-body");
  tbody.innerHTML = "";
  state.players.forEach((p, pi) => {
    const tr = document.createElement("tr");

    // Player name cell
    const nameTd = document.createElement("td");
    nameTd.className = "player-name";
    const nameInp = document.createElement("input");
    nameInp.type = "text";
    nameInp.value = p;
    nameInp.placeholder = "Player name";
    nameInp.addEventListener("input", e => { state.players[pi] = e.target.value; updateLeaderboard(); });
    nameTd.appendChild(nameInp);
    tr.appendChild(nameTd);

    // Pick cells
    RACES.forEach((r, ri) => {
      const td = document.createElement("td");
      td.className = "pick-cell";

      const horseInp = document.createElement("input");
      horseInp.type = "text";
      horseInp.className = "horse-pick" + (state.picks[pi][ri].won ? " won" : "");
      horseInp.value = state.picks[pi][ri].horse;
      horseInp.placeholder = "Horse…";
      horseInp.addEventListener("input", e => {
        state.picks[pi][ri].horse = e.target.value;
      });
      td.appendChild(horseInp);

      const spInp = document.createElement("input");
      spInp.type = "text";
      spInp.inputMode = "decimal";
      spInp.className = "sp-odds";
      spInp.value = state.picks[pi][ri].sp;
      spInp.placeholder = "SP…";
      spInp.addEventListener("input", e => {
        state.picks[pi][ri].sp = e.target.value;
        updateTotals();
      });
      td.appendChild(spInp);

      // Double-click to toggle winner
      horseInp.addEventListener("dblclick", () => {
        state.picks[pi][ri].won = !state.picks[pi][ri].won;
        horseInp.classList.toggle("won", state.picks[pi][ri].won);
        updateTotals();
      });

      tr.appendChild(td);
    });

    // Total cell
    const totalTd = document.createElement("td");
    totalTd.className = "total-cell";
    totalTd.id = `total-${pi}`;
    totalTd.textContent = "0.00";
    tr.appendChild(totalTd);

    tbody.appendChild(tr);
  });

  updateTotals();
}

function playerTotal(pi) {
  return state.picks[pi].reduce((sum, pick) => {
    if (!pick.won) return sum;
    const sp = parseFloat(pick.sp);
    return sum + (isNaN(sp) ? 0 : sp);
  }, 0);
}

function updateTotals() {
  const totals = state.players.map((_, pi) => playerTotal(pi));
  const max = Math.max(...totals, 0);

  totals.forEach((t, pi) => {
    const el = document.getElementById(`total-${pi}`);
    if (!el) return;
    el.textContent = t > 0 ? t.toFixed(2) : "—";
    el.classList.toggle("leader", t === max && max > 0);
  });

  // races done = races where any pick has sp
  const racesDone = RACES.filter((_, ri) =>
    state.picks.some(row => row[ri].sp && row[ri].sp.trim() !== "")
  ).length;

  // pot
  const buyin = parseFloat(document.getElementById("buyin").value) || 25;
  const pot = buyin * state.players.length;
  document.getElementById("pot-val").textContent = `$${pot}`;
  document.getElementById("stat-pot").textContent = `$${pot}`;
  document.getElementById("stat-players").textContent = state.players.length;
  document.getElementById("stat-races").textContent = racesDone;

  const leaderIdx = totals.indexOf(max);
  document.getElementById("stat-leader").textContent = max > 0 ? (state.players[leaderIdx] || "—") : "—";

  updateLeaderboard(totals, pot);
}

function updateLeaderboard(totals, pot) {
  if (!totals) {
    totals = state.players.map((_, pi) => playerTotal(pi));
    const buyin = parseFloat(document.getElementById("buyin").value) || 25;
    pot = buyin * state.players.length;
  }

  const ranked = state.players
    .map((name, pi) => ({ name: name || `Player ${pi+1}`, score: totals[pi], idx: pi }))
    .sort((a, b) => b.score - a.score);

  const lbList = document.getElementById("lb-list");
  lbList.innerHTML = "";
  const trophies = ["🥇","🥈","🥉"];

  ranked.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "lb-row" + (i === 0 && p.score > 0 ? " rank-1" : "");
    const trophy = i < 3 && p.score > 0 ? trophies[i] : "";
    div.innerHTML = `
      <span class="lb-rank">${i+1}</span>
      <span class="lb-trophy">${trophy}</span>
      <span class="lb-name">${p.name}</span>
      <span class="lb-score">${p.score > 0 ? p.score.toFixed(2) : "—"}</span>
      ${i === 0 && p.score > 0 ? `<span class="lb-payout">wins $${pot}</span>` : ""}
    `;
    lbList.appendChild(div);
  });
}

function addPlayer() {
  const n = state.players.length + 1;
  state.players.push(`Player ${n}`);
  state.picks.push(RACES.map(() => ({ horse: "", sp: "", won: false })));
  buildBody();
}

function clearAllSP() {
  state.picks.forEach(row => row.forEach(p => { p.sp = ""; p.won = false; }));
  buildBody();
}

function resetAll() {
  if (!confirm("Reset everything? This cannot be undone.")) return;
  initState();
  buildHeader();
  buildBody();
}

function saveState() {
  try {
    localStorage.setItem("randwick2026", JSON.stringify(state));
    alert("Saved! ✅");
  } catch(e) { alert("Save failed (storage unavailable in this view). Copy the URL to preserve."); }
}

function loadState() {
  try {
    const saved = localStorage.getItem("randwick2026");
    if (!saved) { alert("No saved data found."); return; }
    const loaded = JSON.parse(saved);
    state.players   = loaded.players   || state.players;
    state.picks     = loaded.picks     || state.picks;
    state.raceNames = loaded.raceNames || state.raceNames;
    buildHeader(); buildBody();
    alert("Loaded! ✅");
  } catch(e) { alert("Load failed."); }
}

document.getElementById("buyin").addEventListener("input", updateTotals);

// ── INIT ──────────────────────────────────────────────────────────────────
initState();
buildHeader();
buildBody();
</script>
</body>
</html>
